<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GuiPhish Awareness Lab</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: white;
}

.container {
    background: #111827;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    max-width: 430px;
}

.logo { font-size: 42px; }

p {
    color: #cbd5e1;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.btn-location {
    background: #00e676;
    color: #000;
}

.btn-camera {
    background: #7c4dff;
    color: white;
}

.status {
    margin-top: 18px;
    color: #93c5fd;
}

#video {
    display: none;
    width: 300px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">🔐</div>
    <h2>GuiPhish Awareness Lab</h2>

    <p>Escolha uma simulação de permissão do navegador.</p>

    <button class="btn-location" onclick="testarLocalizacao()">
        🌍 1 - Testar permissão de localização
    </button>

    <button class="btn-camera" onclick="testarCamera()">
        📸 2 - Testar permissão de câmera
    </button>

    <p class="status" id="status">Aguardando seleção...</p>

    <video id="video" autoplay playsinline></video>
</div>

<script>
const statusText = document.getElementById("status");
const video = document.getElementById("video");

async function registrarEvento(tipo, acao, status) {
    const resposta = await fetch("/evento", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            tipo: tipo,
            acao: acao,
            status: status,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        })
    });

    return resposta.ok;
}

async function testarCamera() {
    try {
        statusText.textContent = "Solicitando permissão da câmera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";

        await registrarEvento("camera", "permissao_camera", "permitida");

        statusText.textContent = "Permissão de câmera concedida ✅";

        setTimeout(() => {
            stream.getTracks().forEach(track => track.stop());
            video.style.display = "none";
            statusText.textContent = "Simulação de câmera concluída ✅";
        }, 2000);

    } catch (err) {
        await registrarEvento("camera", "permissao_camera", "negada");
        statusText.textContent = "Permissão da câmera negada ou indisponível ❌";
        alert("Erro: " + err.name + " - " + err.message);
    }
}

function testarLocalizacao() {
    if (!navigator.geolocation) {
        statusText.textContent = "Geolocalização não suportada neste navegador ❌";
        registrarEvento("localizacao", "permissao_localizacao", "nao_suportada");
        return;
    }

    statusText.textContent = "Solicitando permissão de localização...";

    navigator.geolocation.getCurrentPosition(async () => {
        await registrarEvento("localizacao", "permissao_localizacao", "permitida");
        statusText.textContent = "Permissão de localização concedida ✅";
    }, async (error) => {
        await registrarEvento("localizacao", "permissao_localizacao", "negada");
        statusText.textContent = "Permissão de localização negada ❌";
        alert("Erro: " + error.message);
    });
}
</script>

</body>
</html>
