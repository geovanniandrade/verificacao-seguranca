<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');

    async function pedirCamera() {
        try {
            status.textContent = 'Solicitando permissão da câmera...';

            const stream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: false
            });

            video.srcObject = stream;
            video.style.display = 'block';

            status.textContent = 'Câmera permitida com sucesso ✅';
            spinner.style.display = 'none';

            alert('Permissão de câmera concedida ✅');

        } catch (err) {
            console.error(err);
            status.textContent = 'Permissão da câmera negada ou indisponível ❌';
            spinner.style.display = 'none';
            alert('Erro: ' + err.name + ' - ' + err.message);
        }
    }
</script>
