<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atualização de Segurança - Simulação</title>
<style>
body{font-family:Arial,sans-serif;background:#020617;margin:0;color:white;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#111827;padding:38px;border-radius:18px;width:460px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.45);border:1px solid #38bdf8}
.logo{width:62px;height:62px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#2563eb);margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:30px}
h1{color:#38bdf8}
p{color:#cbd5e1;line-height:1.5}
.box{background:#0f172a;border:1px solid #334155;padding:16px;border-radius:12px;margin:20px 0;text-align:left}
button{background:linear-gradient(90deg,#38bdf8,#2563eb);color:white;border:none;padding:14px;width:100%;border-radius:10px;font-weight:bold;cursor:pointer}
.status{margin-top:18px;color:#93c5fd;font-size:14px}
</style>
</head>
<body>
<div class="card">
<div class="logo">🛡️</div>
<h1>Atualização crítica de segurança</h1>
<p>Uma atualização importante foi identificada. Esta página simula mensagens de urgência usadas em ataques de engenharia social.</p>
<div class="box">
<strong>Detalhes:</strong>
<p>Correção de segurança pendente para navegador/sistema.</p>
</div>
<button onclick="registrar()">Iniciar verificação de segurança</button>
<p class="status" id="status">Aguardando interação...</p>
</div>
<script>
const statusText=document.getElementById("status");
const startTime=Date.now();
async function registrar(){
statusText.textContent="Iniciando verificação...";
await fetch("/evento",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
tipo:"template",acao:"clique_atualizacao_seguranca",status:"interagiu",template:"atualizacao_seguranca",
tempo_resposta:Date.now()-startTime,timestamp:new Date().toISOString(),
userAgent:navigator.userAgent,platform:navigator.platform,language:navigator.language,
timezone:Intl.DateTimeFormat().resolvedOptions().timeZone
})});
statusText.textContent="Simulação registrada ✅";
setTimeout(()=>{window.location.href="/awareness"},2000);
}
</script>
</body>
</html>
