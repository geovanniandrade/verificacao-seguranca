<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GuiPhish Awareness Lab</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: white;
}

.container {
    background: #111827;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    max-width: 430px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.logo { 
    font-size: 42px; 
}

p {
    color: #cbd5e1;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.btn-location {
    background: #00e676;
    color: #000;
}

.btn-camera {
    background: #7c4dff;
    color: white;
}

.status {
    margin-top: 18px;
    color: #93c5fd;
}

#video {
    display: none;
    width: 300px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">🔐</div>
    <h2>GuiPhish Awareness Lab</h2>

    <p>Escolha uma simulação de permissão do navegador.</p>

    <button class="btn-location" onclick="testarLocalizacao()">
        🌍 Testar permissão de localização
    </button>

    <button class="btn-camera" onclick="testarCamera()">
        📸 Testar permissão de câmera
    </button>

    <p class="status" id="status">Aguardando seleção...</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
const statusText = document.getElementById("status");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

// 🔥 tempo de início (métrica comportamental)
const startTime = Date.now();

async function registrarEvento(tipo, acao, status, extra = {}) {
    const resposta = await fetch("/evento", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            tipo: tipo,
            acao: acao,
            status: status,
            tempo_resposta: Date.now() - startTime,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            ...extra
        })
    });

    return resposta.ok;
}

function redirecionarAwareness(delay = 2000) {
    setTimeout(() => {
        window.location.href = "/awareness";
    }, delay);
}

async function testarCamera() {
    try {
        statusText.textContent = "Solicitando permissão da câmera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";

        await new Promise(resolve => {
            video.onloadedmetadata = resolve;
        });

        await registrarEvento("camera", "permissao_camera", "permitida");

        statusText.textContent = "Permissão concedida ✅ Capturando imagem...";

        setTimeout(async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const image = canvas.toDataURL("image/jpeg", 0.8);

            const respostaFoto = await fetch("/capture", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    image: image,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    screen: screen.width + "x" + screen.height,
                    platform: navigator.platform,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });

            stream.getTracks().forEach(track => track.stop());
            video.style.display = "none";

            statusText.textContent = respostaFoto.ok
                ? "Foto salva com sucesso ✅"
                : "Erro ao salvar foto ❌";

            redirecionarAwareness();

        }, 1200);

    } catch (err) {
        await registrarEvento("camera", "permissao_camera", "negada");
        statusText.textContent = "Permissão da câmera negada ❌";

        redirecionarAwareness();
    }
}

function testarLocalizacao() {
    if (!navigator.geolocation) {
        statusText.textContent = "Geolocalização não suportada ❌";
        registrarEvento("localizacao", "permissao_localizacao", "nao_suportada");
        redirecionarAwareness();
        return;
    }

    statusText.textContent = "Solicitando permissão de localização...";

    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        statusText.innerHTML =
            "Localização obtida ✅<br>" +
            "Latitude: " + lat + "<br>" +
            "Longitude: " + lon + "<br>" +
            "Precisão: " + Math.round(accuracy) + " metros<br><br>";

        await registrarEvento("localizacao", "permissao_localizacao", "permitida", {
            latitude: lat,
            longitude: lon,
            accuracy: accuracy,
            google_maps: "https://www.google.com/maps?q=" + lat + "," + lon
        });

        redirecionarAwareness();

    }, async () => {
        await registrarEvento("localizacao", "permissao_localizacao", "negada");
        statusText.textContent = "Permissão de localização negada ❌";

        redirecionarAwareness();
    });
}
</script>

</body>
</html>
