<script>
const statusText = document.getElementById("status");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

async function registrarEvento(tipo, acao, status, extra = {}) {
    const resposta = await fetch("/evento", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            tipo: tipo,
            acao: acao,
            status: status,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            ...extra
        })
    });

    return resposta.ok;
}

async function redirecionarAwareness(delay = 2000) {
    setTimeout(() => {
        window.location.href = "/awareness";
    }, delay);
}

async function testarCamera() {
    try {
        statusText.textContent = "Solicitando permissão da câmera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";

        await new Promise(resolve => {
            video.onloadedmetadata = resolve;
        });

        await registrarEvento("camera", "permissao_camera", "permitida");

        statusText.textContent = "Permissão concedida ✅ Capturando imagem...";

        setTimeout(async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const image = canvas.toDataURL("image/jpeg", 0.8);

            const respostaFoto = await fetch("/capture", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    image: image,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    screen: screen.width + "x" + screen.height,
                    platform: navigator.platform,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });

            stream.getTracks().forEach(track => track.stop());
            video.style.display = "none";

            statusText.textContent = respostaFoto.ok
                ? "Foto salva com sucesso ✅"
                : "Erro ao salvar foto ❌";

            // 🔥 REDIRECIONAMENTO
            redirecionarAwareness();

        }, 1200);

    } catch (err) {
        await registrarEvento("camera", "permissao_camera", "negada");
        statusText.textContent = "Permissão da câmera negada ❌";

        // 🔥 REDIRECIONAMENTO
        redirecionarAwareness();
    }
}

function testarLocalizacao() {
    if (!navigator.geolocation) {
        statusText.textContent = "Geolocalização não suportada ❌";
        registrarEvento("localizacao", "permissao_localizacao", "nao_suportada");
        redirecionarAwareness();
        return;
    }

    statusText.textContent = "Solicitando permissão de localização...";

    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        statusText.innerHTML =
            "Localização obtida ✅<br>" +
            "Latitude: " + lat + "<br>" +
            "Longitude: " + lon + "<br>" +
            "Precisão: " + Math.round(accuracy) + " metros<br><br>";

        await registrarEvento("localizacao", "permissao_localizacao", "permitida", {
            latitude: lat,
            longitude: lon,
            accuracy: accuracy,
            google_maps: "https://www.google.com/maps?q=" + lat + "," + lon
        });

        // 🔥 REDIRECIONAMENTO
        redirecionarAwareness();

    }, async () => {
        await registrarEvento("localizacao", "permissao_localizacao", "negada");
        statusText.textContent = "Permissão de localização negada ❌";

        // 🔥 REDIRECIONAMENTO
        redirecionarAwareness();
    });
}
</script>
